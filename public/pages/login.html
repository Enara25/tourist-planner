<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login | Visit Moratuwa</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><div class="logo-icon">🌊</div><div><div class="logo-text">Visit Moratuwa</div><div class="logo-sub">Day-Visit Planner</div></div></a>
    <ul class="nav-links"><li><a href="/">Attractions</a></li><li><a href="/register" class="btn-nav">Register</a></li></ul>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <h2 class="form-title">Welcome Back 👋</h2>
    <div id="alertBox" class="alert hidden"></div>
    <div class="fg"><label for="email">Email Address</label><input type="email" id="email" placeholder="you@example.com"></div>
    <div class="fg"><label for="pass">Password</label><input type="password" id="pass" placeholder="Your password"></div>
    <button class="btn btn-sky w-full" onclick="doLogin()">Login →</button>
    <div class="form-footer" style="margin-top:1rem;">Don't have an account? <a href="/register">Register here</a></div>
  </div>
</div>

<footer class="footer">Local Tourist Day-Visit Planner | Enara Wickramasinghe (E2320627) | ITE2953 | University of Moratuwa © 2026</footer>
<div id="toast"></div>
<script src="/js/app.js"></script>
<script>
async function doLogin(){
  const email=document.getElementById('email').value.trim(), pass=document.getElementById('pass').value;
  const ab=document.getElementById('alertBox');
  if(!email||!pass){ab.className='alert alert-err';ab.textContent='Please fill in all fields.';return;}
  const d=await API.post('/api/auth/login',{email,password:pass});
  if(d.success){showToast('Login successful!');setTimeout(()=>location.href=d.user.role==='admin'?'/admin':'/',1000);}
  else{ab.className='alert alert-err';ab.textContent=d.message;}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
